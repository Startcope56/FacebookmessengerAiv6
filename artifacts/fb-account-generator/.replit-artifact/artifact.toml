kind = "web"
previewPath = "/"
title = "Facebook Account Generator"
version = "1.0.0"
id = "artifacts/fb-account-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21340

[services.development]
run = "pnpm --filter @workspace/fb-account-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fb-account-generator", "run", "build" ]
publicDir = "artifacts/fb-account-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21340"
BASE_PATH = "/"
